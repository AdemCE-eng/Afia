<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>عافية | تسجيل الدخول</title>
    <meta name="description" content="عافية doctor-first care console MVP." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="login">
    <main class="login-shell">
      <section class="login-brand-panel" aria-label="عافية">
        <img src="./assets/afia-logo-clean.png" alt="شعار عافية" />
        <div class="login-brand-word">عافية</div>
        <p>صحتك بين يديك</p>
      </section>

      <section class="login-card">
        <div class="brand mb-10">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <div class="brand-name">عافية</div>
            <div id="loginModeLabel" class="brand-subtitle">Doctor workspace</div>
          </div>
        </div>

        <div class="mb-7">
          <h1 class="page-title">Sign in</h1>
          <p class="page-caption">Choose how you want to enter the demo.</p>
        </div>

        <form id="loginForm" class="form-stack">
          <div class="role-switch" aria-label="Choose login perspective">
            <button class="role-option active" type="button" data-login-role="doctor">
              <i data-lucide="stethoscope"></i>
              <span>Doctor</span>
            </button>
            <button class="role-option" type="button" data-login-role="patient">
              <i data-lucide="user-round"></i>
              <span>Patient</span>
            </button>
          </div>
          <div class="field">
            <label for="doctorId">Doctor ID</label>
            <input id="doctorId" autocomplete="username" value="dr.khalid" />
          </div>
          <div class="field">
            <label for="password">Demo password</label>
            <input id="password" type="password" autocomplete="current-password" value="healthium-demo" />
          </div>
          <div class="action-row">
            <button class="btn btn-primary" type="submit">
              <i data-lucide="log-in"></i>
              Continue
            </button>
            <button class="btn btn-secondary" id="demoFillButton" type="button">
              <i data-lucide="wand-2"></i>
              Fill demo
            </button>
          </div>
          <p id="loginError" class="hidden text-sm font-bold text-red-700"></p>
        </form>
      </section>
    </main>

    <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>
    <script src="./lang.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
